version: "3.9"

services:
  tb-detect:
    build: .
    ports:
      - "8080:8080"
    volumes:
      # Mount your trained model here:
      - ./models:/tb-detector/models:ro
    environment:
      MODEL_PATH: /tb-detector/models/best_cnn.keras
      THRESHOLD: "0.5"
      FLASK_DEBUG: "false"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
